<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte des Associations — Fédération Île-de-France</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bleu:#1a3a5c;--bleu-clair:#2563a8;--or:#c9952a;--or-clair:#f0c060;--bg:#f5f3ef;--blanc:#fff;--gris:#8a8478;--gris-clair:#e8e4dc;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--bleu);}
  #header{background:var(--bleu);color:#fff;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;box-shadow:0 2px 12px rgba(0,0,0,.18);position:relative;z-index:1000;}
  .logo-badge{width:44px;height:44px;background:var(--or);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  #header h1{font-family:'DM Serif Display',serif;font-size:1.25rem;line-height:1.2;}
  #header h1 span{color:var(--or-clair);font-style:italic;}
  #header-stats{display:flex;gap:14px;flex-wrap:wrap;}
  .stat-chip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 13px;font-size:.8rem;display:flex;align-items:center;gap:5px;white-space:nowrap;}
  .stat-chip strong{color:var(--or-clair);font-size:.95rem;}
  #app{display:flex;height:calc(100vh - 72px);}
  #sidebar{width:320px;min-width:260px;background:#fff;display:flex;flex-direction:column;border-right:2px solid var(--gris-clair);overflow:hidden;flex-shrink:0;}
  #search-area{padding:12px 14px 8px;}
  #search-input{width:100%;padding:8px 12px;border:1.5px solid var(--gris-clair);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.86rem;outline:none;background:var(--bg);color:var(--bleu);transition:border-color .2s;}
  #search-input:focus{border-color:var(--bleu-clair);}
  #filter-area{padding:6px 14px 10px;border-bottom:1px solid var(--gris-clair);display:flex;flex-direction:column;gap:5px;}
  .filter-label{font-size:.72rem;color:var(--gris);font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
  #dept-filter,#disc-filter{width:100%;padding:6px 10px;border:1.5px solid var(--gris-clair);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.82rem;background:var(--bg);color:var(--bleu);outline:none;cursor:pointer;}
  #results-count{padding:7px 14px;font-size:.76rem;color:var(--gris);border-bottom:1px solid var(--gris-clair);background:var(--bg);}
  #list{overflow-y:auto;flex:1;}
  .assoc-item{padding:10px 14px;border-bottom:1px solid var(--gris-clair);cursor:pointer;transition:background .15s;display:flex;gap:9px;align-items:flex-start;}
  .assoc-item:hover,.assoc-item.active{background:#eef3fa;}
  .assoc-dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex-shrink:0;}
  .assoc-name{font-weight:600;font-size:.85rem;color:var(--bleu);line-height:1.3;}
  .assoc-ville{font-size:.76rem;color:var(--gris);margin-top:2px;}
  .assoc-disc{font-size:.7rem;color:var(--bleu-clair);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #map{flex:1;}
  .leaflet-popup-content-wrapper{border-radius:10px!important;box-shadow:0 4px 24px rgba(26,58,92,.15)!important;padding:0!important;overflow:hidden;}
  .leaflet-popup-content{margin:0!important;min-width:230px!important;}
  .popup-header{background:var(--bleu);color:#fff;padding:11px 14px;}
  .popup-name{font-family:'DM Serif Display',serif;font-size:.95rem;line-height:1.3;}
  .popup-dept{font-size:.72rem;color:var(--or-clair);margin-top:2px;}
  .popup-body{padding:10px 14px;display:flex;flex-direction:column;gap:6px;}
  .popup-row{display:flex;gap:7px;align-items:flex-start;font-size:.78rem;}
  .popup-icon{color:var(--bleu-clair);flex-shrink:0;margin-top:1px;}
  .popup-link a,.popup-mail a{color:var(--bleu-clair);text-decoration:none;font-size:.75rem;}
  .popup-link a:hover,.popup-mail a:hover{text-decoration:underline;}
  #legend{position:absolute;bottom:24px;right:10px;background:#fff;border-radius:10px;box-shadow:0 4px 16px rgba(26,58,92,.13);padding:10px 14px;z-index:999;}
  .legend-title{font-weight:700;font-size:.74rem;color:var(--bleu);margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em;}
  .legend-item{display:flex;align-items:center;gap:7px;font-size:.75rem;color:var(--bleu);margin-bottom:4px;}
  .legend-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
  @media(max-width:650px){#sidebar{display:none;}#app{height:calc(100vh - 60px);}}
</style>
</head>

</div>

// Build discipline list
const discs=new Set();
DATA.forEach(d=>(d.Disc||'').split(',').forEach(s=>{const t=s.trim();if(t)discs.add(t);}));
const ds=document.getElementById('disc-filter');
[...discs].sort().forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;ds.appendChild(o);});

const map=L.map('map',{center:[48.85,2.34],zoom:10});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CartoDB',maxZoom:19}).addTo(map);
const layer=L.layerGroup().addTo(map);

DATA.forEach(d=>{
  const c=col(d.CP);
  const m=L.marker([d.lat,d.lng],{icon:icon(c)});
  const phone=d.Tel||d.Port||'';
  m.bindPopup(`<div class="popup-header"><div class="popup-name">${d['Nom Structure']}</div><div class="popup-dept">${d.Commune} · ${d.CP}</div></div><div class="popup-body"><div class="popup-row"><span class="popup-icon">📍</span><span>${d.Adresse}, ${d.CP} ${d.Commune}</span></div>${d.Disc?`<div class="popup-row"><span class="popup-icon">🏅</span><span>${d.Disc}</span></div>`:''} ${phone?`<div class="popup-row"><span class="popup-icon">📞</span><span>${phone}</span></div>`:''} ${d.Mail?`<div class="popup-mail popup-row"><span class="popup-icon">✉️</span><a href="mailto:${d.Mail}">${d.Mail}</a></div>`:''} ${d.Site?`<div class="popup-link popup-row"><span class="popup-icon">🌐</span><a href="${d.Site}" target="_blank">${d.Site.replace(/^https?:\/\//,'').substring(0,38)}</a></div>`:''}</div>`,{maxWidth:290});
  layer.addLayer(m);
  d._marker=m;
});

function render(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const dept=document.getElementById('dept-filter').value;
  const disc=document.getElementById('disc-filter').value;
  const filtered=DATA.filter(d=>{
    if(dept&&!(d.CP||'').startsWith(dept))return false;
    if(disc&&!(d.Disc||'').includes(disc))return false;
    if(q&&!(d['Nom Structure']||'').toLowerCase().includes(q)&&!(d.Commune||'').toLowerCase().includes(q))return false;
    return true;
  });
  document.getElementById('stat-visible').textContent=filtered.length;
  document.getElementById('results-count').textContent=`${filtered.length} association${filtered.length>1?'s':''} trouvée${filtered.length>1?'s':''}`;
  DATA.forEach(d=>{
    if(!d._marker)return;
    filtered.includes(d)?layer.addLayer(d._marker):layer.removeLayer(d._marker);
  });
  const list=document.getElementById('list');
  list.innerHTML='';
  filtered.forEach(d=>{
    const c=col(d.CP);
    const discs=(d.Disc||'').split(',').slice(0,2).map(s=>s.trim()).join(', ');
    const el=document.createElement('div');
    el.className='assoc-item';
    el.innerHTML=`<div class="assoc-dot" style="background:${c}"></div><div style="min-width:0"><div class="assoc-name">${d['Nom Structure']}</div><div class="assoc-ville">${d.Commune} (${d.CP})</div>${discs?`<div class="assoc-disc">${discs}</div>`:''}</div>`;
    el.onclick=()=>{
      map.flyTo([d.lat,d.lng],15,{duration:.7});
      d._marker.openPopup();
      document.querySelectorAll('.assoc-item').forEach(e=>e.classList.remove('active'));
      el.classList.add('active');
    };
    list.appendChild(el);
  });
}
document.getElementById('search-input').addEventListener('input',render);
document.getElementById('dept-filter').addEventListener('change',render);
document.getElementById('disc-filter').addEventListener('change',render);
render();
</script>
